[project]
name = "keycloak-mcp-server"
version = "0.1.0"
description = "MCP server exposing Keycloak Admin REST API as MCP tools, generated from vendored OpenAPI spec."
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0.0",
    "httpx>=0.27.0",
    "jsonschema>=4.21.0",
    "pydantic-settings>=2.2.0",
]

[project.scripts]
keycloak-mcp-server = "keycloak_mcp.server:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "respx>=0.21.0",
    "mypy>=1.10.0",
    "types-jsonschema>=4.21.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/keycloak_mcp"]

[tool.hatch.build.targets.wheel.force-include]
"src/keycloak_mcp/spec/keycloak-openapi.json" = "keycloak_mcp/spec/keycloak-openapi.json"

[tool.hatch.build.targets.sdist]
include = ["src/keycloak_mcp/spec/keycloak-openapi.json"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.mypy]
plugins = ["pydantic.mypy"]
